# .github/workflows/build.yml
name: HarmonyOS CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 核心修正：使用开源镜像或 npm 包来获取 hvigor 和 ohpm
      - name: Setup HarmonyOS Environment via npm
        run: |
          # 安装 Node.js (如果运行器没有的话，但 GitHub 运行器通常自带)
          # sudo apt update && sudo apt install -y nodejs npm
          
          # 通过 npm 全局安装 hvigor 和 ohpm
          npm install -g @ohos/hvigor @ohos/hvigor-ohos-plugin
          npm install -g @ohos/ohpm
          
          # 验证安装
          hvigorw -v || echo "hvigorw not found, trying npx..."
          ohpm -v
          
          # 使用 npx 运行 hvigor 命令
          echo "::add-path::$(npm bin -g)"

      # 注意：HarmonyOS SDK 对于基本构建并非必需，但如果你的项目需要特定的 SDK 版本，
      # 可以考虑使用开源社区提供的 SDK 包，如从 ohos-sdk 仓库获取。
      # 以下步骤可选，用于下载一个基本的 SDK 包。
      - name: Download HarmonyOS SDK (Optional)
        run: |
          wget -q -O ohos-sdk.tar.gz https://github.com/ohos/ohos-sdk/releases/download/3.2.12.5/ohos-sdk-linux.tar.gz
          tar -xzf ohos-sdk.tar.gz -C $HOME
          echo "::set-env name=OHOS_SDK_HOME::$HOME/ohos-sdk"
        continue-on-error: true

      - name: Install ohpm dependencies
        run: |
          # 确保 ohpm 命令可用
          npx ohpm install
        continue-on-error: true

      - name: Build HAP
        run: |
          # 使用 npx 运行 hvigorw 命令
          npx hvigorw clean
          npx hvigorw assembleHap -p product=default -p buildMode=release

      - name: Upload HAP Artifact
        uses: actions/upload-artifact@v4
        with:
          name: hap-build
          path: |
            **/build/outputs/hap/*.hap